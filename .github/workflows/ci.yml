name: CI

on: [push, pull_request]

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - name: get repo
        uses: actions/checkout@v3

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: install dependencies
        run: |
          pip install flake8 black[jupyter] isort

      - name: lint with flake8
        run: |
          flake8

      - name: lint with black
        run: |
          black --check .

      - name: lint with isort
        run: |
          isort --check .

  train-model:

      needs: lint

      runs-on: ubuntu-latest

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.12"

        - name: Download feature dataset
          run: |
            curl -LsSf https://hf.co/cli/install.sh | bash
            hf auth login --token $HUGGINGFACE_TOKEN
            hf download jeesoo9595/heavyedge-features-v1 --repo-type dataset --revision v1.3.0 --local-dir _data
          env:
            HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

        - name: install package
          run: |
            pip install -r requirements.txt

        - name: build models
          run: |
            HEAVYEDGE_N_EPOCHS=1 make models

        - name: test models in build environment
          run: make test

        - uses: actions/upload-artifact@v4
          with:
            name: trained-models
            path: model/*
            retention-days: 1

  find-notebooks:

      needs: train-model

      runs-on: ubuntu-latest

      outputs:
        notebooks: ${{ steps.list.outputs.notebooks }}

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: list notebooks
          id: list
          run: |
            notebooks=$(find notebooks -name "*.ipynb" | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "notebooks=$notebooks" >> $GITHUB_OUTPUT

  notebooks:

      needs: find-notebooks

      runs-on: ubuntu-latest

      strategy:
        fail-fast: false
        matrix:
          notebook: ${{ fromJson(needs.find-notebooks.outputs.notebooks) }}

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.12"

        - name: Download feature dataset
          run: |
            curl -LsSf https://hf.co/cli/install.sh | bash
            hf auth login --token $HUGGINGFACE_TOKEN
            hf download jeesoo9595/heavyedge-features-v1 --repo-type dataset --revision v1.3.0 --local-dir _data
          env:
            HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

        - name: install package
          run: |
            pip install -r requirements.txt

        - uses: actions/download-artifact@v4
          with:
            name: trained-models
            path: model

        - run: HEAVYEDGE_N_EPOCHS=1 make ${{ matrix.notebook }}

  test-model:

      needs: train-model

      runs-on: ubuntu-latest

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.12"

        - name: install package
          run: pip install -r model/requirements.txt

        - uses: actions/download-artifact@v4
          with:
            name: trained-models
            path: model

        - name: test models in inference environment
          run: make test

  docker-build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build models in Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: models
          build-args: |
            HEAVYEDGE_N_EPOCHS=1
          secrets: |
            hf_token=${{ secrets.HUGGINGFACE_TOKEN }}
          outputs: type=local,dest=./_docker

      - name: Build notebooks in Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: notebooks
          build-args: |
            HEAVYEDGE_N_EPOCHS=1
          secrets: |
            hf_token=${{ secrets.HUGGINGFACE_TOKEN }}
          outputs: type=local,dest=./_docker
